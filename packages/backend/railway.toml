# railway.toml — Backend service configuration
#
# Usage: Prefer setting the backend Railway service root directory to "." so
# Railway uses the repo-root railway.toml. This file remains as a package-local
# fallback for services rooted at packages/backend.
#
# JADEASSIST_MINIMAL_MODE=auto boots safely during setup, but automatically
# enables the full backend as soon as required configuration is present.

[build]
builder = "nixpacks"
buildCommand = "npm run build"
watchPaths = ["packages/backend/**", "packages/shared/**"]

[deploy]
startCommand = "JADEASSIST_MINIMAL_MODE=${JADEASSIST_MINIMAL_MODE:-auto} npm run start"
healthcheckPath = "/healthz"
healthcheckTimeout = 30
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
