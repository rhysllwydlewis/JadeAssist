# railway.toml — Widget service reference (packages/widget directory)
#
# This file is intentionally documentation-only. The repo-root railway.toml now
# deploys the backend API so the backend Railway domain can never accidentally
# serve the widget static server and return 421 WRONG_SERVICE for
# /api/widget/chat.
#
# Recommended widget hosting:
#   1. Build:  npm ci && npm run build --workspace=packages/widget
#   2. Serve:  packages/widget/dist as a Railway Static site, GitHub Pages, or CDN
#   3. Embed:  <script src="https://<widget-host>/jade-widget.js"></script>
#   4. Point:  apiBaseUrl at the backend domain, e.g.
#              https://jadeassistbackend-production.up.railway.app
#
# Do not use the backend service/domain to host this static widget bundle.
