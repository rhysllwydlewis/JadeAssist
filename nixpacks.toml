# nixpacks.toml — Repo-root Nixpacks configuration (fallback)
#
# This file is a fallback for any Railway service whose Root Directory is set
# to "." (repo root) and uses the Nixpacks builder.
#
# Current Railway service layout:
#   @jadeassist/backend  | Root Directory: packages/backend | Nixpacks
#                          reads packages/backend/nixpacks.toml
#   @jadeassist/widget   | Root Directory: .  (repo root)   | Dockerfile
#                          reads railway.toml → packages/widget/Dockerfile
#                          (Nixpacks is NOT used for the widget service)
#
# Because the widget now uses a Dockerfile build, this file is not actively
# used by either service in the standard configuration.  It is retained as a
# safety net in case a service is accidentally pointed at the repo root with
# the Nixpacks builder selected.

[phases.install]
cmds = ["npm ci"]

[phases.build]
cmds = ["npm run build --workspace=packages/backend"]
