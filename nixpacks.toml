# nixpacks.toml — Explicit Nixpacks build configuration for JadeAssist backend
#
# Why this file exists
# --------------------
# Nixpacks auto-generates a Dockerfile that:
#   1. Runs `npm ci` in its own install phase (with a BuildKit cache mount
#      targeting /app/node_modules/.cache).
#   2. Then executes whatever is in `railway.toml`'s buildCommand as a second
#      RUN layer.
#
# If buildCommand also starts with `npm ci`, the second invocation tries to
# delete and recreate node_modules while the BuildKit cache is still mounted on
# node_modules/.cache → EBUSY / ENOTEMPTY.
#
# This file pins the install step to a single `npm ci` and keeps the build
# step to compilation only.

[phases.install]
cmds = ["npm ci"]

[phases.build]
cmds = ["npm run build --workspace=packages/backend"]
