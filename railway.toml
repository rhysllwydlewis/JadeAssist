# railway.toml — Backend service configuration (repo root)
#
# This root config intentionally deploys the JadeAssist BACKEND API. Railway
# services are often created with Root Directory set to "." by default; if this
# file deploys the widget static server, the public backend domain can answer
# /api/widget/chat with 421 WRONG_SERVICE (the live EventFlow failure mode).
#
# Safe Railway setup:
#   @jadeassist/backend  -> Root Directory: .  -> railway.toml (this file)
#   @jadeassist/widget   -> Static site / CDN for packages/widget/dist
#
# The backend service requires OPENAI_API_KEY, JWT_SECRET, and MONGODB_URL for
# full chat functionality. Without them it starts in controlled minimal mode so
# /healthz remains available and feature routes return clear JSON errors.

[build]
builder = "nixpacks"
buildCommand = "npm run build --workspace=packages/backend"
watchPaths = ["packages/backend/**", "packages/shared/**", "package.json", "package-lock.json", "tsconfig.json"]

[deploy]
startCommand = "npm run start --workspace=packages/backend"
healthcheckPath = "/healthz"
healthcheckTimeout = 30
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
