# railway.toml — Backend service configuration (repo root)
#
# This root config intentionally deploys the JadeAssist BACKEND API. Railway
# services are often created with Root Directory set to "." by default; if this
# file deploys the widget static server, the public backend domain can answer
# /api/widget/chat with 421 WRONG_SERVICE (the live EventFlow failure mode).
#
# Safe Railway setup:
#   @jadeassist/backend  -> Root Directory: .  -> railway.toml (this file)
#   @jadeassist/widget   -> Static site / CDN for packages/widget/dist
#
# Railway starts in JADEASSIST_MINIMAL_MODE=auto by default. Auto mode boots
# safely when secrets are missing, but automatically enables the full agent as
# soon as MONGODB_URL, OPENAI_API_KEY, and JWT_SECRET are present. Use
# JADEASSIST_MINIMAL_MODE=false for strict fail-fast production checks, or true
# only when intentionally disabling feature routes during setup.

[build]
builder = "nixpacks"
buildCommand = "npm run build --workspace=packages/backend"
watchPaths = ["packages/backend/**", "packages/shared/**", "package.json", "package-lock.json", "tsconfig.json"]

[deploy]
startCommand = "JADEASSIST_MINIMAL_MODE=${JADEASSIST_MINIMAL_MODE:-auto} npm run start --workspace=packages/backend"
healthcheckPath = "/healthz"
healthcheckTimeout = 30
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
