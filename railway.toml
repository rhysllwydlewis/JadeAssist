# railway.toml — Widget service configuration (repo root)
#
# This file is read by the @jadeassist/widget Railway service.
# The widget service Root Directory MUST be set to "." (repo root) in the
# Railway dashboard so that:
#   1. Railway reads THIS file.
#   2. The Docker build context includes package-lock.json (at repo root) and
#      all workspace packages, which are required for `npm ci` to succeed.
#
# In a multi-service Railway project there are TWO services:
#
#   Service              | Root Directory    | railway.toml used
#   ---------------------|-------------------|------------------------------------
#   @jadeassist/backend  | packages/backend  | packages/backend/railway.toml  ✓
#   @jadeassist/widget   | .  (repo root)    | railway.toml (this file)        ✓
#
# !! Do NOT set the backend service Root Directory to "." (repo root) — it will
#    read this file and try to build/start the widget instead of the backend. !!
#
# The @jadeassist/widget service does NOT need OPENAI_API_KEY or JWT_SECRET.
# See RAILWAY.md for the full setup guide.
# ─────────────────────────────────────────────────────────────────────────────

[build]
builder = "dockerfile"
dockerfilePath = "packages/widget/Dockerfile"
watchPaths = ["packages/widget/**", "packages/shared/**"]

[deploy]
startCommand = "node server.js"
healthcheckPath = "/healthz"
healthcheckTimeout = 30
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
